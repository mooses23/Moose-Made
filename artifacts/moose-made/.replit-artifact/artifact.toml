kind = "web"
previewPath = "/"
title = "Moose Made"
version = "1.0.0"
id = "artifacts/moose-made"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21933

[services.development]
run = "pnpm --filter @workspace/moose-made run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moose-made", "run", "build" ]
publicDir = "artifacts/moose-made/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21933"
BASE_PATH = "/"
